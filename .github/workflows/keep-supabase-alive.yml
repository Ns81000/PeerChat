name: Keep Supabase Alive

on:
  schedule:
    # Runs every Wednesday and Saturday at 06:00 UTC
    - cron: "0 6 * * 3,6"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          echo "Pinging Supabase to prevent free tier pausing..."

          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "Missing required secrets: SUPABASE_URL and/or SUPABASE_ANON_KEY"
            exit 1
          fi

          RESPONSE=$(curl -sS -o /dev/null -w "%{http_code}" \
            --max-time 20 \
            "$SUPABASE_URL/rest/v1/" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY")

          echo "Response status: $RESPONSE"

          if [ "$RESPONSE" -ge 200 ] && [ "$RESPONSE" -lt 500 ]; then
            echo "Supabase is alive and responding! (HTTP $RESPONSE)"
          else
            echo "Supabase ping failed with status: $RESPONSE"
            exit 1
          fi
