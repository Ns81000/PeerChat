<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#cccccc"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Chat bubble left -->
  <rect x="100" y="140" width="220" height="120" rx="20" fill="url(#accent)" opacity="0.9"/>
  <polygon points="140,260 120,300 180,260" fill="url(#accent)" opacity="0.9"/>
  <!-- Chat bubble right -->
  <rect x="192" y="240" width="220" height="120" rx="20" fill="url(#accent)" opacity="0.5"/>
  <polygon points="372,360 392,400 332,360" fill="url(#accent)" opacity="0.5"/>
  <!-- Connection dots representing P2P -->
  <circle cx="160" cy="190" r="10" fill="#0a0a0a"/>
  <circle cx="200" cy="190" r="10" fill="#0a0a0a"/>
  <circle cx="240" cy="190" r="10" fill="#0a0a0a"/>
</svg>
